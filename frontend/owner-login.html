<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owner Login | Siribhoomi Farm and Organic Store</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <span class="brand-mark">S</span>
          <span class="brand-text">
            Siribhoomi Farm
            <small>Organic Store</small>
          </span>
        </a>
      </div>
    </header>

    <main class="container">
      <section class="section">
        <div class="auth-shell">
          <div class="auth-panel auth-panel-copy panel panel-pad">
            <div class="eyebrow">Private access</div>
            <h1 class="section-title">Owner login</h1>
            <p class="section-subtitle">
              Sign in with an owner or admin account to access the private dashboard.
            </p>
            <div class="auth-points">
              <div class="auth-point">
                <strong>Role protected</strong>
                <span class="muted">Only owner or admin accounts can continue.</span>
              </div>
              <div class="auth-point">
                <strong>Separate from customers</strong>
                <span class="muted">This page is kept apart from the customer login flow.</span>
              </div>
            </div>
          </div>

          <div class="auth-panel panel panel-pad">
            <div id="owner-auth-message" class="notice" hidden></div>
            <form id="owner-login-form" class="auth-form">
              <div class="field-group">
                <label for="owner-login-username">Username</label>
                <input id="owner-login-username" name="username" type="text" autocomplete="username" required />
              </div>
              <div class="field-group">
                <label for="owner-login-password">Password</label>
                <input id="owner-login-password" name="password" type="password" autocomplete="current-password" required />
              </div>
              <button class="button button-primary auth-button" type="submit">Owner Log In</button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/owner-session.js"></script>
    <script src="js/owner-auth.js"></script>
  </body>
</html>
